name: Java CI with Maven

# Trigger on every push and pull request to any branch
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    name: Build & Test (Java 17)
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up the correct Java version
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven          # Caches ~/.m2 between runs for faster builds

      # 3. Build the project and run all unit tests
      - name: Build with Maven
        run: mvn --batch-mode --no-transfer-progress clean verify

      # 4. (Optional) Upload the test report as an artifact for review
      - name: Upload test report
        if: always()            # Run even when tests fail so you can inspect results
        uses: actions/upload-artifact@v4
        with:
          name: surefire-test-report
          path: target/surefire-reports/
          retention-days: 7
