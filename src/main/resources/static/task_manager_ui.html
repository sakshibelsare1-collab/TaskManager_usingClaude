<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .app { padding: 1.5rem; max-width: 720px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .header h1 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #3B6D11; display: inline-block; margin-right: 6px; }
  .status-label { font-size: 13px; color: var(--color-text-secondary); display: flex; align-items: center; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
  .stat-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .form-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
  .form-card h2 { font-size: 14px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .form-row input, .form-row textarea { flex: 1; font-size: 14px; }
  textarea { resize: none; height: 60px; }
  .btn-add { background: #185FA5; color: #E6F1FB; border: none; border-radius: var(--border-radius-md); padding: 0 18px; height: 36px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .btn-add:hover { background: #0C447C; }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }
  .filters { display: flex; gap: 6px; margin-bottom: 1rem; }
  .filter-btn { background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: 20px; padding: 4px 14px; font-size: 13px; cursor: pointer; color: var(--color-text-secondary); }
  .filter-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .task-list { display: flex; flex-direction: column; gap: 8px; }
  .task-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; transition: border-color 0.15s; }
  .task-card:hover { border-color: var(--color-border-secondary); }
  .task-card.done { opacity: 0.6; }
  .task-card.done .task-title { text-decoration: line-through; color: var(--color-text-secondary); }
  .checkbox { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--color-border-secondary); cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; background: transparent; }
  .checkbox.checked { background: #1D9E75; border-color: #1D9E75; }
  .checkbox.checked::after { content: ''; display: block; width: 5px; height: 9px; border: 2px solid #E1F5EE; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px; }
  .task-desc { font-size: 13px; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-id { font-size: 11px; color: var(--color-text-tertiary); margin-top: 4px; font-family: var(--font-mono); }
  .task-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .btn-icon { background: transparent; border: 0.5px solid transparent; border-radius: var(--border-radius-md); width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--color-text-tertiary); font-size: 14px; }
  .btn-icon:hover { background: var(--color-background-secondary); border-color: var(--color-border-tertiary); color: var(--color-text-primary); }
  .btn-del:hover { background: var(--color-background-danger); border-color: var(--color-border-danger); color: var(--color-text-danger); }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--color-text-tertiary); font-size: 14px; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #2C2C2A; color: #F1EFE8; padding: 10px 18px; border-radius: var(--border-radius-md); font-size: 13px; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 999; }
  .toast.show { opacity: 1; }
  .api-note { font-size: 12px; color: var(--color-text-tertiary); background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 12px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 6px; }
  .api-url { font-family: var(--font-mono); font-size: 11px; }
  .loading { text-align: center; padding: 2rem; color: var(--color-text-tertiary); font-size: 14px; }
  .error-banner { background: var(--color-background-danger); border: 0.5px solid var(--color-border-danger); color: var(--color-text-danger); border-radius: var(--border-radius-md); padding: 10px 14px; margin-bottom: 1rem; font-size: 13px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .badge-done { background: #EAF3DE; color: #3B6D11; }
  .badge-pending { background: #FAEEDA; color: #854F0B; }
</style>

<div class="app">
  <h2 class="sr-only">Task Manager — interactive UI connected to localhost:8082</h2>

  <div class="header">
    <h1>Task Manager</h1>
    <span class="status-label" id="conn-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">connecting...</span>
    </span>
  </div>

  <div class="api-note">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.2"/><path d="M8 7v5M8 5v1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    Connected to <span class="api-url">http://localhost:8082/tasks</span>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">Pending</div><div class="stat-value" id="s-pending">—</div></div>
    <div class="stat"><div class="stat-label">Completed</div><div class="stat-value" id="s-done">—</div></div>
  </div>

  <div class="form-card">
    <h2>Add new task</h2>
    <div class="form-row">
      <input type="text" id="inp-title" placeholder="Task title (required)" maxlength="100" />
    </div>
    <div class="form-row">
      <textarea id="inp-desc" placeholder="Description (optional)" maxlength="500"></textarea>
    </div>
    <div style="display:flex; justify-content:flex-end;">
      <button class="btn-add" id="btn-add" onclick="createTask()">+ Add task</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Completed</button>
  </div>

  <div id="error-area"></div>
  <div id="task-list" class="task-list"><div class="loading">Loading tasks...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE = 'http://localhost:8082';
let tasks = [];
let filter = 'all';

async function api(path, method='GET', body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  if (!r.ok) { const e = await r.json().catch(()=>({message:r.statusText})); throw new Error(e.message || r.statusText); }
  if (r.status === 204) return null;
  return r.json();
}

function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#A32D2D' : '#2C2C2A';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showError(msg) {
  document.getElementById('error-area').innerHTML = msg
    ? `<div class="error-banner">${msg}</div>` : '';
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

async function loadTasks() {
  try {
    tasks = await api('/tasks');
    showError('');
    setConnected(true);
  } catch(e) {
    setConnected(false);
    showError('Cannot reach API at localhost:8082 — make sure the Spring Boot app is running.');
    tasks = [];
  }
  render();
}

function setConnected(ok) {
  document.getElementById('status-dot').style.background = ok ? '#3B6D11' : '#A32D2D';
  document.getElementById('status-text').textContent = ok ? 'connected' : 'offline';
}

function render() {
  const filtered = tasks.filter(t =>
    filter === 'all' ? true : filter === 'done' ? t.completed : !t.completed
  );
  const total = tasks.length;
  const done = tasks.filter(t => t.completed).length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-pending').textContent = total - done;
  document.getElementById('s-done').textContent = done;

  const list = document.getElementById('task-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty">${tasks.length ? 'No tasks match this filter.' : 'No tasks yet — add one above.'}</div>`;
    return;
  }
  list.innerHTML = filtered.map(t => `
    <div class="task-card ${t.completed ? 'done' : ''}" id="tc-${t.id}">
      <div class="checkbox ${t.completed ? 'checked' : ''}" onclick="toggleTask(${t.id}, ${t.completed})"></div>
      <div class="task-body">
        <div class="task-title">${esc(t.title)}</div>
        ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
        <div class="task-id">#${t.id} &nbsp;·&nbsp; <span class="badge ${t.completed ? 'badge-done' : 'badge-pending'}">${t.completed ? 'completed' : 'pending'}</span></div>
      </div>
      <div class="task-actions">
        <button class="btn-icon btn-del" title="Delete" onclick="deleteTask(${t.id})">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V3h4v1M5 4l.5 9h5L11 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function createTask() {
  const title = document.getElementById('inp-title').value.trim();
  const description = document.getElementById('inp-desc').value.trim();
  if (!title) { toast('Title is required', true); document.getElementById('inp-title').focus(); return; }
  const btn = document.getElementById('btn-add');
  btn.disabled = true; btn.textContent = 'Adding...';
  try {
    const t = await api('/tasks', 'POST', { title, description, completed: false });
    tasks.push(t);
    document.getElementById('inp-title').value = '';
    document.getElementById('inp-desc').value = '';
    toast('Task added');
    render();
  } catch(e) { toast(e.message, true); }
  btn.disabled = false; btn.textContent = '+ Add task';
}

async function toggleTask(id, wasCompleted) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  try {
    const updated = await api(`/tasks/${id}`, 'PUT', {...t, completed: !wasCompleted});
    Object.assign(t, updated);
    toast(updated.completed ? 'Marked complete' : 'Marked pending');
    render();
  } catch(e) { toast(e.message, true); }
}

async function deleteTask(id) {
  try {
    await api(`/tasks/${id}`, 'DELETE');
    tasks = tasks.filter(t => t.id !== id);
    toast('Task deleted');
    render();
  } catch(e) { toast(e.message, true); }
}

document.getElementById('inp-title').addEventListener('keydown', e => {
  if (e.key === 'Enter') createTask();
});

loadTasks();
setInterval(loadTasks, 15000);
</script>
